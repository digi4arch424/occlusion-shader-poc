<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Occlusion PoC — M1: Basic Scene</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #hud {
      position: fixed;
      top: 16px; left: 16px;
      color: #00ff99;
      font-size: 12px;
      line-height: 2;
      background: rgba(0,0,0,0.75);
      padding: 14px 18px;
      border-radius: 6px;
      border: 1px solid #00ff9933;
      backdrop-filter: blur(8px);
      pointer-events: none;
      z-index: 10;
    }
    #hud .title {
      font-size: 14px;
      font-weight: bold;
      color: #00ff99;
      border-bottom: 1px solid #00ff9944;
      padding-bottom: 6px;
      margin-bottom: 6px;
    }
    #hud .check { color: #00ff99; }
    #hud .hint  { color: #556677; margin-top: 8px; font-size: 11px; }

    #milestone-badge {
      position: fixed;
      top: 16px; right: 16px;
      font-size: 13px;
      font-weight: bold;
      color: #fff;
      background: #1a3a24;
      border: 2px solid #00ff99;
      padding: 8px 14px;
      border-radius: 6px;
      letter-spacing: 1px;
      z-index: 10;
    }

    #stats {
      position: fixed;
      bottom: 16px; left: 16px;
      color: #334455;
      font-size: 11px;
      line-height: 1.8;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- HUD overlay -->
  <div id="hud">
    <div class="title">🟢 MILESTONE 1 — Basic 3D Scene</div>
    <div class="check">✅ Perspective camera (FOV 60°)</div>
    <div class="check">✅ Manual orbit controls</div>
    <div class="check">✅ Sphere — green (target)</div>
    <div class="check">✅ Cube — blue (occluder)</div>
    <div class="check">✅ Ambient + directional + rim lights</div>
    <div class="hint">
      Left drag → orbit &nbsp;|&nbsp; Scroll → zoom<br>
      Right drag → pan
    </div>
  </div>

  <div id="milestone-badge">🟢 M1</div>

  <div id="stats">
    cam: <span id="cam-pos">—</span><br>
    fps: <span id="fps">—</span>
  </div>

  <!-- Three.js r128 from cdnjs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // ═══════════════════════════════════════════════════
    //  MILESTONE 1 — Basic 3D Scene (Sanity Check)
    //  No shaders. No depth tricks. Just geometry + light.
    // ═══════════════════════════════════════════════════

    const W = window.innerWidth;
    const H = window.innerHeight;

    // ── Renderer ────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: 'high-performance',
    });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    // ── Scene ───────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050508);
    scene.fog = new THREE.FogExp2(0x050508, 0.018);

    // ── Camera ──────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(60, W / H, 0.05, 300);
    camera.position.set(0, 4, 14);
    camera.lookAt(0, 0, 0);

    // ── Lights ──────────────────────────────────────────

    // Ambient — soft fill
    const ambientLight = new THREE.AmbientLight(0x1a2a3a, 1.0);
    scene.add(ambientLight);

    // Key light — directional with shadows
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.4);
    keyLight.position.set(6, 12, 8);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width  = 2048;
    keyLight.shadow.mapSize.height = 2048;
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far  = 60;
    keyLight.shadow.camera.left   = -15;
    keyLight.shadow.camera.right  =  15;
    keyLight.shadow.camera.top    =  15;
    keyLight.shadow.camera.bottom = -15;
    keyLight.shadow.bias = -0.001;
    scene.add(keyLight);

    // Rim light — blue accent from behind
    const rimLight = new THREE.PointLight(0x0066ff, 1.8, 35);
    rimLight.position.set(-8, 4, -8);
    scene.add(rimLight);

    // Fill light — warm low bounce
    const fillLight = new THREE.PointLight(0xff6622, 0.5, 20);
    fillLight.position.set(8, -2, 6);
    scene.add(fillLight);

    // ── Occluder: Cube ─────────────────────────────────
    // Positioned at origin — between camera and sphere
    const cubeGeo = new THREE.BoxGeometry(3.0, 3.0, 3.0);
    const cubeMat = new THREE.MeshStandardMaterial({
      color:     0x3344aa,
      roughness: 0.35,
      metalness: 0.45,
      envMapIntensity: 0.8,
    });
    const cube = new THREE.Mesh(cubeGeo, cubeMat);
    cube.position.set(0, 0, 0);
    cube.castShadow    = true;
    cube.receiveShadow = true;
    scene.add(cube);

    // Cube wireframe overlay — helps visualise its bounds
    const wireGeo = new THREE.EdgesGeometry(cubeGeo);
    const wireMat = new THREE.LineBasicMaterial({ color: 0x6677ff, linewidth: 1 });
    const wireframe = new THREE.LineSegments(wireGeo, wireMat);
    cube.add(wireframe);

    // ── Target: Sphere ──────────────────────────────────
    // Placed behind the cube relative to the default camera
    const sphereGeo = new THREE.SphereGeometry(1.3, 48, 48);
    const sphereMat = new THREE.MeshStandardMaterial({
      color:     0x00ff88,
      roughness: 0.15,
      metalness: 0.55,
      emissive:  new THREE.Color(0x003311),
    });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    sphere.position.set(0, 0, -5.5); // behind cube in Z
    sphere.castShadow    = true;
    sphere.receiveShadow = true;
    scene.add(sphere);

    // ── Ground Plane ────────────────────────────────────
    const groundGeo = new THREE.PlaneGeometry(60, 60);
    const groundMat = new THREE.MeshStandardMaterial({
      color:     0x0a0a14,
      roughness: 0.95,
      metalness: 0.05,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2.1;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid helper — subtle
    const grid = new THREE.GridHelper(60, 30, 0x111133, 0x0a0a1a);
    grid.position.y = -2.09;
    scene.add(grid);

    // ── Axis helper (tiny) ──────────────────────────────
    const axes = new THREE.AxesHelper(2);
    axes.position.set(-8, -1.9, -8);
    scene.add(axes);

    // ══════════════════════════════════════════════════
    //  SIMPLE ORBIT CONTROLS (no external lib needed)
    // ══════════════════════════════════════════════════
    const orbitState = {
      theta:  0.3,          // horizontal angle (rad)
      phi:    Math.PI / 5,  // vertical angle   (rad)
      radius: 14,           // distance from target
      target: new THREE.Vector3(0, 0, 0),

      // drag state
      leftDown:  false,
      rightDown: false,
      lastX: 0,
      lastY: 0,
    };

    function updateCamera() {
      const { theta, phi, radius, target } = orbitState;
      camera.position.set(
        target.x + radius * Math.sin(phi) * Math.sin(theta),
        target.y + radius * Math.cos(phi),
        target.z + radius * Math.sin(phi) * Math.cos(theta)
      );
      camera.lookAt(target);
    }

    const canvas = renderer.domElement;

    canvas.addEventListener('mousedown', e => {
      if (e.button === 0) { orbitState.leftDown  = true; }
      if (e.button === 2) { orbitState.rightDown = true; }
      orbitState.lastX = e.clientX;
      orbitState.lastY = e.clientY;
    });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    window.addEventListener('mouseup', e => {
      orbitState.leftDown  = false;
      orbitState.rightDown = false;
    });

    window.addEventListener('mousemove', e => {
      const dx = e.clientX - orbitState.lastX;
      const dy = e.clientY - orbitState.lastY;
      orbitState.lastX = e.clientX;
      orbitState.lastY = e.clientY;

      if (orbitState.leftDown) {
        // Orbit
        orbitState.theta -= dx * 0.006;
        orbitState.phi    = Math.max(0.08, Math.min(Math.PI - 0.08,
                            orbitState.phi - dy * 0.006));
        updateCamera();
      }

      if (orbitState.rightDown) {
        // Pan in camera-local XY
        const panSpeed = orbitState.radius * 0.001;
        const right = new THREE.Vector3();
        const up    = new THREE.Vector3();
        camera.getWorldDirection(new THREE.Vector3()); // ensure matrix up to date
        right.crossVectors(
          camera.getWorldDirection(new THREE.Vector3()),
          camera.up
        ).negate().normalize();
        up.copy(camera.up).normalize();

        orbitState.target.addScaledVector(right, dx * panSpeed);
        orbitState.target.addScaledVector(up, -dy * panSpeed);
        updateCamera();
      }
    });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      orbitState.radius = Math.max(2, Math.min(80,
                          orbitState.radius + e.deltaY * 0.025));
      updateCamera();
    }, { passive: false });

    // Touch support (basic pinch + drag)
    let lastTouchDist = 0;
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        orbitState.leftDown = true;
        orbitState.lastX = e.touches[0].clientX;
        orbitState.lastY = e.touches[0].clientY;
      }
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouchDist = Math.sqrt(dx*dx + dy*dy);
      }
    }, { passive: true });
    canvas.addEventListener('touchend', () => { orbitState.leftDown = false; }, { passive: true });
    canvas.addEventListener('touchmove', e => {
      if (e.touches.length === 1 && orbitState.leftDown) {
        const dx = e.touches[0].clientX - orbitState.lastX;
        const dy = e.touches[0].clientY - orbitState.lastY;
        orbitState.theta -= dx * 0.006;
        orbitState.phi = Math.max(0.08, Math.min(Math.PI - 0.08, orbitState.phi - dy * 0.006));
        orbitState.lastX = e.touches[0].clientX;
        orbitState.lastY = e.touches[0].clientY;
        updateCamera();
      }
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        orbitState.radius *= lastTouchDist / dist;
        orbitState.radius = Math.max(2, Math.min(80, orbitState.radius));
        lastTouchDist = dist;
        updateCamera();
      }
    }, { passive: true });

    updateCamera();

    // ══════════════════════════════════════════════════
    //  ANIMATION LOOP
    // ══════════════════════════════════════════════════
    const clock = new THREE.Clock();
    let frameCount = 0;
    let lastFPSTime = performance.now();
    const camPosEl = document.getElementById('cam-pos');
    const fpsEl    = document.getElementById('fps');

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Gentle cube Y rotation so we can see it's a 3D object
      cube.rotation.y = t * 0.25;

      // Sphere subtle hover — confirms the scene is live
      sphere.position.y = Math.sin(t * 0.8) * 0.3;

      // Stats readout
      frameCount++;
      const now = performance.now();
      if (now - lastFPSTime > 500) {
        const fps = Math.round(frameCount / ((now - lastFPSTime) / 1000));
        fpsEl.textContent = fps;
        frameCount = 0;
        lastFPSTime = now;

        const p = camera.position;
        camPosEl.textContent =
          `(${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)})`;
      }

      renderer.render(scene, camera);
    }

    animate();

    // ── Resize handler ───────────────────────────────
    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    });

    // ── Console confirmation ─────────────────────────
    console.log('%c[M1] Scene initialised ✅', 'color:#00ff99; font-weight:bold');
    console.log('  Objects in scene:', scene.children.length);
    console.log('  Renderer:', renderer.info.render);
  </script>
</body>
</html>
